name: OpalineFMMobile
options:
  bundleIdPrefix: jp.hidecade
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    CLANG_CXX_LANGUAGE_STANDARD: c++17
    CLANG_CXX_LIBRARY: libc++
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
targets:
  OpalineFMMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: ../../Source/Engine
        name: SharedEngine
      - path: ../../assets/factory.syx
        buildPhase: resources
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: AVKit.framework
      - sdk: AudioToolbox.framework
      - sdk: CoreMIDI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hidekikonishi.opalinefm.mobile
        PRODUCT_NAME: Opaline FM
        INFOPLIST_KEY_CFBundleDisplayName: Opaline FM
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: 5
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 8H7SC722UJ
        INFOPLIST_FILE: Sources/Resources/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Native/OpalineFMMobile-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - ../../Source
          - ../../build/generated
    info:
      path: Sources/Resources/Info.plist
      properties:
        CFBundleDisplayName: Opaline FM
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiresFullScreen: true
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - arm64
