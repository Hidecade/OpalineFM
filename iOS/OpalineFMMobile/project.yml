name: OpalineFMMobile
options:
  bundleIdPrefix: jp.hidecade
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    CLANG_CXX_LANGUAGE_STANDARD: c++17
    CLANG_CXX_LIBRARY: libc++
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
targets:
  OpalineFMMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: ../../Source/Engine
        name: SharedEngine
      - path: ../../assets/factory.syx
        buildPhase: resources
      - path: ../../assets/factory.opalinelibrary.xml
        buildPhase: resources
    dependencies:
      - target: OpalineFMAUv3Extension
        embed: true
      - sdk: AVFoundation.framework
      - sdk: AVKit.framework
      - sdk: AudioToolbox.framework
      - sdk: CoreMIDI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hidekikonishi.opalinefm.mobile
        PRODUCT_NAME: Opaline FM
        INFOPLIST_KEY_CFBundleDisplayName: Opaline FM
        MARKETING_VERSION: "1.0.5"
        CURRENT_PROJECT_VERSION: 9
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 8H7SC722UJ
        INFOPLIST_FILE: Sources/Resources/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Native/OpalineFMMobile-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - ../../Source
          - ../../build/generated
    info:
      path: Sources/Resources/Info.plist
      properties:
        CFBundleDisplayName: Opaline FM
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiresFullScreen: true
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - arm64
  OpalineFMAUv3Extension:
    type: app-extension
    platform: iOS
    sources:
      - path: AUv3Extension
      - path: ../../Source/Engine
        name: SharedEngine
      - path: ../../assets/factory.syx
        buildPhase: resources
      - path: ../../assets/factory.opalinelibrary.xml
        buildPhase: resources
    dependencies:
      - sdk: AudioToolbox.framework
      - sdk: AVFoundation.framework
      - sdk: CoreAudioKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hidekikonishi.opalinefm.mobile.auv3
        PRODUCT_NAME: OpalineFMAUv3Extension
        PRODUCT_MODULE_NAME: OpalineFMAUv3Extension
        INFOPLIST_KEY_CFBundleDisplayName: Opaline FM
        MARKETING_VERSION: "1.0.5"
        CURRENT_PROJECT_VERSION: 9
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 8H7SC722UJ
        APPLICATION_EXTENSION_API_ONLY: true
        INFOPLIST_FILE: AUv3Extension/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: AUv3Extension/OpalineFMAUv3Extension-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - ../../Source
          - ../../build/generated
    info:
      path: AUv3Extension/Info.plist
      properties:
        CFBundleDisplayName: Opaline FM
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.AudioUnit-UI
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).AudioUnitViewController"
          NSExtensionAttributes:
            AudioComponents:
              - type: aumu
                subtype: OpFM
                manufacturer: Hcde
                name: "Hidecade: Opaline FM"
                description: Opaline FM AUv3 Instrument
                version: 1
schemes:
  OpalineFMMobile:
    build:
      targets:
        OpalineFMMobile: all
    run:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
